name: Build Full LLVM for iOS ARM64

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

jobs:
  build-full-llvm:
    runs-on: macos-latest
    
    steps:
    - name: Checkout LLVM
      uses: actions/checkout@v4
      with:
        repository: llvm/llvm-project
        ref: main
        depth: 1
    
    - name: Configure CMake
      run: |
        mkdir build && cd build
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_ENABLE_PROJECTS="clang;lld" \
          -DLLVM_ENABLE_RUNTIMES="libcxx;libcxxabi;libunwind" \
          -DCMAKE_OSX_ARCHITECTURES="arm64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
          -DLLVM_TARGETS_TO_BUILD="AArch64" \
          -DLLVM_DEFAULT_TARGET_TRIPLE="arm64-apple-ios13.0" \
          -DLLVM_ENABLE_ASSERTIONS=OFF \
          -DLLVM_INCLUDE_TESTS=OFF \
          -DLLVM_INCLUDE_EXAMPLES=OFF \
          -DLLVM_INCLUDE_BENCHMARKS=OFF \
          -DLLVM_INCLUDE_DOCS=OFF \
          -DLLVM_ENABLE_BINDINGS=OFF \
          -DLLVM_ENABLE_TERMINFO=OFF \
          -DLLVM_ENABLE_LIBEDIT=OFF \
          -DCMAKE_CXX_FLAGS="-O3" \
          ../llvm
    
    - name: Build
      run: |
        cd build
        ninja clang lld
    
    - name: Build Runtimes (libc++ etc.)
      run: |
        cd build
        # 构建 runtimes 需要单独配置
        ninja runtimes
    
    - name: Package
      run: |
        cd build
        mkdir -p package/usr/local/{bin,lib,include}
        cp -r bin/* package/usr/local/bin/
        cp -r lib/*.dylib package/usr/local/lib/ 2>/dev/null || true
        cp -r include/c++ package/usr/local/include/ 2>/dev/null || true
        
        # 从 runtimes 目录复制 libc++
        find runtimes -name "libc++.dylib" -exec cp {} package/usr/local/lib/ \;
        find runtimes -name "libc++abi.dylib" -exec cp {} package/usr/local/lib/ \;
        find runtimes -name "libunwind.dylib" -exec cp {} package/usr/local/lib/ \;
        find runtimes -name "c++" -type d -exec cp -r {} package/usr/local/include/ \;
        
        cd package
        tar -czf ../llvm-ios-arm64.tar.gz .
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: llvm-ios-arm64
        path: build/llvm-ios-arm64.tar.gz

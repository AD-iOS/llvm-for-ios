name: Build LLVM for Jailbreak iOS (Full)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Clone iOS SDK
      run: |
        git clone https://github.com/xybp888/iOS-SDKs.git
        echo "IOS_SDKROOT=$(pwd)/iOS-SDKs/iPhoneOS16.5.sdk" >> $GITHUB_ENV
    
    - name: Clone LLVM
      run: |
        git clone --depth 1 https://github.com/llvm/llvm-project.git
    
    - name: Build Native Tools
      run: |
        MACOS_SDK=$(xcrun --sdk macosx --show-sdk-path)
        
        mkdir build-native
        cd build-native
        
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_SYSROOT="$MACOS_SDK" \
          -DLLVM_TARGETS_TO_BUILD="AArch64" \
          -DLLVM_ENABLE_PROJECTS="clang;lld" \
          -DLLVM_INCLUDE_TESTS=OFF \
          ../llvm-project/llvm
        
        ninja llvm-tblgen clang-tblgen llvm-config
    
    - name: Build LLVM Tools for iOS
      run: |
        mkdir build-ios
        cd build-ios
        
        cat > ios.toolchain.cmake << 'EOF'
        set(CMAKE_SYSTEM_NAME Darwin)
        set(CMAKE_SYSTEM_PROCESSOR arm64)
        set(CMAKE_CROSSCOMPILING ON)
        
        set(CMAKE_OSX_SYSROOT "$ENV{IOS_SDKROOT}")
        set(CMAKE_OSX_DEPLOYMENT_TARGET 16.5)
        set(CMAKE_OSX_ARCHITECTURES arm64)
        
        # 重要：設定 CMAKE_C_COMPILER 為 host 編譯器，而非目標編譯器
        # 因為我們是在 host 上編譯給 iOS 的程式
        execute_process(COMMAND xcrun --find clang OUTPUT_VARIABLE HOST_CC OUTPUT_STRIP_TRAILING_WHITESPACE)
        execute_process(COMMAND xcrun --find clang++ OUTPUT_VARIABLE HOST_CXX OUTPUT_STRIP_TRAILING_WHITESPACE)
        
        set(CMAKE_C_COMPILER "${HOST_CC}" CACHE STRING "" FORCE)
        set(CMAKE_CXX_COMPILER "${HOST_CXX}" CACHE STRING "" FORCE)
        set(CMAKE_ASM_COMPILER "${HOST_CC}" CACHE STRING "" FORCE)
        
        # 設定目標三元組
        set(CMAKE_C_COMPILER_TARGET arm64-apple-ios16.5)
        set(CMAKE_CXX_COMPILER_TARGET arm64-apple-ios16.5)
        set(CMAKE_ASM_COMPILER_TARGET arm64-apple-ios16.5)
        
        # 強制設定編譯器 flags
        set(CMAKE_C_FLAGS "-target arm64-apple-ios16.5 -arch arm64 -isysroot $ENV{IOS_SDKROOT} -miphoneos-version-min=16.5" CACHE STRING "" FORCE)
        set(CMAKE_CXX_FLAGS "-target arm64-apple-ios16.5 -arch arm64 -isysroot $ENV{IOS_SDKROOT} -miphoneos-version-min=16.5 -stdlib=libc++" CACHE STRING "" FORCE)
        set(CMAKE_ASM_FLAGS "-target arm64-apple-ios16.5 -arch arm64 -isysroot $ENV{IOS_SDKROOT} -miphoneos-version-min=16.5" CACHE STRING "" FORCE)
        
        set(CMAKE_FIND_ROOT_PATH "$ENV{IOS_SDKROOT}")
        set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
        set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
        set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
        EOF
        
        cmake -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=ios.toolchain.cmake \
          -DCMAKE_BUILD_TYPE=MinSizeRel \
          -DCMAKE_OSX_SYSROOT="$IOS_SDKROOT" \
          -DLLVM_HOST_TRIPLE=arm64-apple-ios16.5 \
          -DLLVM_DEFAULT_TARGET_TRIPLE=arm64-apple-ios16.5 \
          -DLLVM_TARGET_ARCH=AArch64 \
          -DLLVM_TABLEGEN="${{ github.workspace }}/build-native/bin/llvm-tblgen" \
          -DCLANG_TABLEGEN="${{ github.workspace }}/build-native/bin/clang-tblgen" \
          -DLLVM_CONFIG_PATH="${{ github.workspace }}/build-native/bin/llvm-config" \
          -DLLVM_USE_HOST_TOOLS=ON \
          -DLLVM_ENABLE_PROJECTS="clang;lld" \
          -DLLVM_TARGETS_TO_BUILD="AArch64" \
          -DLLVM_INCLUDE_TESTS=OFF \
          -DLLVM_INCLUDE_EXAMPLES=OFF \
          -DLLVM_INCLUDE_BENCHMARKS=OFF \
          -DLLVM_INCLUDE_DOCS=OFF \
          -DLLVM_BUILD_LLVM_DYLIB=OFF \
          -DLLVM_LINK_LLVM_DYLIB=OFF \
          -DLLVM_ENABLE_ZLIB=OFF \
          -DLLVM_ENABLE_ZSTD=OFF \
          -DLLVM_ENABLE_TERMINFO=OFF \
          -DCMAKE_C_COMPILER_WORKS=ON \
          -DCMAKE_CXX_COMPILER_WORKS=ON \
          -DHAVE_LIBRT=0 \
          ../llvm-project/llvm
        
        ninja clang lld llvm-ranlib llvm-strip llvm-objcopy \
              llvm-objdump llvm-nm llvm-size llvm-strings \
              llvm-readelf llvm-addr2line llvm-dwarfdump \
              llvm-cov llvm-profdata llvm-symbolizer llvm-ar
    
    - name: Build Runtimes for iOS
      run: |
        mkdir build-runtimes
        cd build-runtimes
        
        IOS_CLANG="${{ github.workspace }}/build-ios/bin/clang"
        if [ ! -f "$IOS_CLANG" ]; then
          echo "Error: iOS clang not found at $IOS_CLANG"
          exit 1
        fi
        
        cat > ios.runtime.toolchain.cmake << EOF
        set(CMAKE_SYSTEM_NAME Darwin)
        set(CMAKE_SYSTEM_PROCESSOR arm64)
        set(CMAKE_CROSSCOMPILING ON)
        
        set(CMAKE_OSX_SYSROOT "$IOS_SDKROOT")
        set(CMAKE_OSX_DEPLOYMENT_TARGET 16.5)
        set(CMAKE_OSX_ARCHITECTURES arm64)
        
        set(CMAKE_C_COMPILER "$IOS_CLANG")
        set(CMAKE_CXX_COMPILER "${IOS_CLANG}++")
        set(CMAKE_ASM_COMPILER "$IOS_CLANG")
        
        set(CMAKE_C_COMPILER_TARGET arm64-apple-ios16.5)
        set(CMAKE_CXX_COMPILER_TARGET arm64-apple-ios16.5)
        set(CMAKE_ASM_COMPILER_TARGET arm64-apple-ios16.5)
        
        set(CMAKE_FIND_ROOT_PATH "$IOS_SDKROOT")
        set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
        set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
        set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
        EOF
        
        cmake -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=ios.runtime.toolchain.cmake \
          -DCMAKE_BUILD_TYPE=MinSizeRel \
          -DCMAKE_OSX_SYSROOT="$IOS_SDKROOT" \
          -DCMAKE_AR="${{ github.workspace }}/build-ios/bin/llvm-ar" \
          -DCMAKE_RANLIB="${{ github.workspace }}/build-ios/bin/llvm-ranlib" \
          -DLLVM_ENABLE_RUNTIMES="compiler-rt;libcxx;libcxxabi;libunwind" \
          -DLLVM_RUNTIME_TARGETS="arm64-apple-ios16.5" \
          -DLLVM_ENABLE_LIBCXX=ON \
          -DLIBCXX_ENABLE_SHARED=OFF \
          -DLIBCXX_ENABLE_STATIC=ON \
          -DLIBCXXABI_ENABLE_SHARED=OFF \
          -DLIBCXXABI_ENABLE_STATIC=ON \
          -DLIBUNWIND_ENABLE_SHARED=OFF \
          -DLIBUNWIND_ENABLE_STATIC=ON \
          -DCOMPILER_RT_ENABLE_IOS=ON \
          -DCOMPILER_RT_BUILD_SANITIZERS=OFF \
          -DCOMPILER_RT_BUILD_XRAY=OFF \
          -DCOMPILER_RT_BUILD_LIBFUZZER=OFF \
          -DCOMPILER_RT_BUILD_PROFILE=OFF \
          -DCOMPILER_RT_BUILD_BUILTINS=ON \
          -DCOMPILER_RT_DEFAULT_TARGET_ONLY=ON \
          -DCMAKE_C_COMPILER_WORKS=ON \
          -DCMAKE_CXX_COMPILER_WORKS=ON \
          ../llvm-project/llvm
        
        ninja runtimes
    
    - name: Package Full Toolchain
      run: |
        mkdir -p package/var/jb/usr/lib/llvm-main/bin \
                 package/var/jb/usr/lib \
                 package/var/jb/usr/include/c++/v1
        
        # 複製 iOS 工具
        cd build-ios
        if [ -d "bin" ]; then
          for tool in bin/*; do
            if [[ -f "$tool" ]] && [[ -x "$tool" ]] && [[ "$(basename $tool)" != "llvm-config" ]]; then
              cp "$tool" ../package/var/jb/usr/lib/llvm-main/bin/
            fi
          done
        fi
        cd ..
        
        # 複製 native llvm-config
        cp build-native/bin/llvm-config package/var/jb/usr/lib/llvm-main/bin/
        
        # 建立 symlinks
        cd package/var/jb/usr/lib/llvm-main/bin
        ln -sf clang clang++
        ln -sf llvm-ar ar
        ln -sf llvm-ranlib ranlib
        ln -sf llvm-strip strip
        ln -sf llvm-objcopy objcopy
        ln -sf llvm-objdump objdump
        ln -sf llvm-nm nm
        ln -sf llvm-strings strings
        cd ${{ github.workspace }}
        
        # 複製 C++ 標頭檔
        if [ -d "llvm-project/libcxx/include" ]; then
          cp -r llvm-project/libcxx/include/* package/var/jb/usr/include/c++/v1/
        fi
        
        # 複製 runtime 函式庫
        cd build-runtimes
        for lib in libc++.a libc++abi.a libunwind.a; do
          if [ -f "lib/$lib" ]; then
            cp "lib/$lib" ../package/var/jb/usr/lib/
          fi
        done
        
        if [ -d "lib/clang" ]; then
          mkdir -p ../package/var/jb/usr/lib/clang
          cp -r lib/clang/* ../package/var/jb/usr/lib/clang/
        fi
        cd ..
        
        # 建立壓縮檔
        tar -czf llvm-for-ios-full.tar.gz -C package .
    
    - name: Upload Full Toolchain
      uses: actions/upload-artifact@v4
      with:
        name: llvm-for-ios-full
        path: llvm-for-ios-full.tar.gz
